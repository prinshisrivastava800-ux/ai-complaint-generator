<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <meta name="description"
          content="AI Complaint Generator powered by Google Gemini AI">

    <meta name="author"
          content="Prinshi Srivastava">

    <title>AI Complaint Generator</title>

    <link rel="stylesheet" href="style.css">

</head>

<body>

<div class="container">

    <h1>🤖 AI Complaint Generator</h1>

    <p class="subtitle">
        Generate professional complaint letters instantly using Google Gemini AI.
    </p>

    <form id="complaintForm">

        <!-- Complaint Type -->

        <label for="complaintType">Complaint Type</label>

        <select id="complaintType">

            <option>Hostel Complaint</option>
            <option>College Complaint</option>
            <option>Electricity Complaint</option>
            <option>Water Complaint</option>
            <option>Internet Complaint</option>
            <option>Consumer Complaint</option>

        </select>

        <!-- Recipient -->

        <label for="recipient">Recipient</label>

        <input
            type="text"
            id="recipient"
            placeholder="Example: Hostel Warden"
            autocomplete="off">

        <!-- Problem -->

        <label for="problem">Describe Your Problem</label>

        <textarea
            id="problem"
            rows="6"
            placeholder="Briefly describe your issue..."
            required></textarea>

        <!-- Tone -->

        <label for="tone">Complaint Tone</label>

        <select id="tone">

            <option>Formal</option>
            <option>Polite</option>
            <option>Strict</option>

        </select>

        <!-- Generate Button -->

        <button
            id="generateBtn"
            type="button">

            <span id="btnText">

                Generate Complaint

            </span>

            <span
                id="loader"
                class="loader"></span>

        </button>

    </form>

    <h2>Generated Complaint</h2>

    <textarea
        id="output"
        rows="12"
        placeholder="Your AI-generated complaint will appear here..."
        readonly></textarea>

    <div class="button-group">

        <button
            id="copyBtn"
            type="button">

            📋 Copy Complaint

        </button>

        <button
            id="downloadBtn"
            type="button">

            📄 Download PDF

        </button>

    </div>

    <div class="footer">

        <p>
            Developed by <strong>Prinshi Srivastava</strong>
        </p>

        <p>
            B.Tech Biotechnology | IBM GenAI & Cloud Computing Internship Project
        </p>

    </div>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<script src="script.js"></script>

</body>

</html>
